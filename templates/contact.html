<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | AiSentinal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a href="index.html" class="logo"><span class="logo-mark">AS</span><span>AiSentinal</span></a>
      <button class="menu-btn" id="menuBtn" aria-label="Toggle navigation">Menu</button>
      <nav class="site-nav" id="siteNav">
        <a href="index.html">Home</a>
        <a href="about.html">About Us</a>
        <a href="login.html" class="btn btn-link">Login</a>
        <a href="signup.html" class="btn btn-primary">Sign Up</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="page-head">
      <div class="container">
        <h1>Contact Us</h1>
        <p class="lead">Reach out for demos, pricing, integration support, or security partnerships.</p>
      </div>
    </section>

    <section class="container grid-3 section">
      <article class="card">
        <h3>Email</h3>
        <p>support@aisentinal.ai</p>
      </article>
      <article class="card">
        <h3>Phone</h3>
        <p>+1 (800) 555-0199</p>
      </article>
      <article class="card">
        <h3>Office</h3>
        <p>1200 Security Ave, Suite 210, Austin, TX</p>
      </article>
    </section>

    <section class="form-wrap card">
      <form>
        <label for="name">Name</label>
        <input id="name" type="text" placeholder="Your name" required>

        <label for="cemail">Email</label>
        <input id="cemail" type="email" placeholder="you@company.com" required>

        <label for="message">Message</label>
        <textarea id="message" rows="5" placeholder="How can we help?" required></textarea>

        <div class="form-actions">
          <button class="btn btn-primary" type="submit">Send Message</button>
        </div>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-wrap">
      <p>© 2026 AiSentinal. All rights reserved.</p>
      <div class="footer-links"><a href="faq.html">FAQ</a><a href="contact.html">Contact Us</a></div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
